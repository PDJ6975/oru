name: CI

on:
  push:

jobs:
  # Detecta qué carpeta del monorepo cambió para no arrancar jobs innecesarios
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      ios: ${{ steps.filter.outputs.ios }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ios:
              - 'ios/**'
            api:
              - 'api/**'

  # ───────────────────────── iOS ─────────────────────────
  swiftlint:
    name: SwiftLint
    needs: changes
    if: ${{ needs.changes.outputs.ios == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Imagen oficial de SwiftLint mont sobre ubuntu para aumentar velocidad
      - name: SwiftLint
        run: docker run --rm -v "$PWD/ios":/work -w /work ghcr.io/realm/swiftlint:0.63.2 swiftlint --strict

  ios-build:
    name: iOS Build
    needs: changes
    if: ${{ needs.changes.outputs.ios == 'true' }}
    runs-on: macos-26
    defaults:
      run:
        working-directory: ios
    steps:
      - uses: actions/checkout@v4

      - name: Build Release
        run: |
          xcodebuild build \
            -scheme Oru \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

  # ───────────────────────── API ─────────────────────────
  api:
    name: API Lint & Test
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL_TEST: postgresql://postgres@localhost:5432/oru_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: api/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Biome
        run: pnpm run ci
      - name: Vitest + coverage
        run: pnpm run test:coverage

  # ─────────────────── Todo el repositorio ───────────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL_TEST: postgresql://postgres@localhost:5432/oru_test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: api/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: api/pnpm-lock.yaml
      - name: Generar cobertura de la API
        working-directory: api
        run: |
          pnpm install --frozen-lockfile
          pnpm run test:coverage
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
